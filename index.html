  <!-- GitHub Pages SPA redirect 解碼：還原 404.html 傳過來的 ?p= 路徑 -->
  <script>
    (function () {
      var redirect = new URLSearchParams(window.location.search).get('p');
      if (redirect) {
        var decoded = decodeURIComponent(redirect);
        // 移除 ?p= 並把真實路徑交給 Vue Router
        window.history.replaceState(null, '', decoded);
      }
    })();
  </script>
