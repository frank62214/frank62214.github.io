<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="./public/hackdog-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>頁面不存在 - 重新導向中...</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HL83Z44XG2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-HL83Z44XG2');
  </script>

  <script>
    // 將原始 path 編碼為 ?p= 帶到 hackdog.tw，
    // 避免 hackdog.tw 本身的 404 再次 redirect 造成無限循環
    var originalPath = window.location.pathname + window.location.search + window.location.hash;
    var targetUrl = 'https://hackdog.tw/?p=' + encodeURIComponent(originalPath);
    window.location.replace(targetUrl);
  </script>
</head>

<body>
  <p>頁面不存在，正在為您重新導向...</p>
</body>

</html>
