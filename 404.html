<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Frank Hsu</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #38bdf8;
      --primary-hover: #0ea5e9;
      --border: rgba(148, 163, 184, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(17, 24, 39, 0.92);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.45);
    }

    .code {
      margin: 0 0 12px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 16px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .primary {
      background: var(--primary);
      color: #082f49;
    }

    .primary:hover {
      background: var(--primary-hover);
    }

    .secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: transparent;
    }

    .secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
  <script>
    (function () {
      var path = window.location.pathname || '/';
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      var lastSegment = path.split('/').pop() || '';
      var hasExtension = /\.[A-Za-z0-9]+$/.test(lastSegment);

      if (path !== '/' && !hasExtension) {
        var normalizedPath = path.replace(/\/+$/, '');
        var targetUrl = 'https://hackdog.tw/frank62214/#' + normalizedPath + search + hash;

        if (window.location.href !== targetUrl) {
          window.location.replace(targetUrl);
        }
      }
    })();
  </script>
</head>

<body>
  <main>
    <p class="code">404 Not Found</p>
    <h1>這個頁面不存在</h1>
    <p>你要找的內容可能已經搬家、網址輸入錯誤，或目前沒有對應的公開頁面。</p>
    <div class="actions">
      <a class="primary" href="/frank62214/#/">返回履歷首頁</a>
      <a class="secondary" href="https://hackdog.tw/">前往工作室首頁</a>
    </div>
  </main>
</body>

</html>
